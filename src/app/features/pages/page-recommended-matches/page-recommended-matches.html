<div class="mobile-canvas p-4 bg-white min-h-screen max-w-md mx-auto border shadow-sm">
  <!-- Search Input Header Panel[cite: 1] -->
  <div class="relative my-4">
    <input
      [formControl]="searchControl"
      type="text"
      placeholder="Search Courses (e.g. Algorithms)"
      class="w-full pl-10 pr-4 py-2 border rounded-full text-sm bg-gray-50 focus:outline-none focus:ring-1 focus:ring-gray-400"
    />
    <span class="absolute left-3 top-2.5 text-gray-400 text-sm">🔍</span>
  </div>

  <h2 class="text-xl font-bold font-serif mb-4 text-gray-800">Recommended Matches</h2>

  <!-- Iterative Data Feed Loop[cite: 1] -->
  <div class="space-y-4">
    @for (tutor of filteredMatches$ | async; track tutor.id) {
      <div class="border rounded-2xl p-4 flex flex-col items-center text-center bg-white shadow-xs">
        <div
          class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center mb-2 border"
        >
          <span class="text-gray-400 text-2xl">👤</span>
        </div>
        <h3 class="font-bold text-lg text-gray-900">{{ tutor.name }}</h3>
        <p class="text-xs text-gray-500 mb-2">Department: {{ tutor.department }}</p>

        <!-- Chips UI rendering array lists[cite: 1] -->
        <div class="flex flex-wrap gap-1 justify-center mb-4">
          @for (course of tutor.canTeach; track course) {
            <span
              class="px-3 py-1 bg-gray-100 text-gray-700 text-xs rounded-full border border-gray-300"
            >
              {{ course }}
            </span>
          }
        </div>

        <button
          (click)="viewProfile(tutor)"
          class="w-full py-2 bg-zinc-700 text-white font-medium text-sm rounded-xl hover:bg-zinc-800 transition-colors"
        >
          View Profile / Request
        </button>
      </div>
    } @empty {
      <p class="text-center text-sm text-gray-400 mt-8">
        No matching tutors found on your campus right now.
      </p>
    }
  </div>
</div>
