<div
  class="mobile-canvas max-w-md mx-auto border shadow-sm bg-white min-h-screen p-5 flex flex-col justify-between font-sans text-zinc-800"
>
  <div>
    <!-- Device Simulated Top Status Frame -->
    <div
      class="text-xs font-bold font-mono tracking-wider flex justify-between items-center mb-4 text-zinc-900"
    >
      <span>10:00 AM</span>
      <div class="flex space-x-1 items-center">
        <span>📶</span>
        <span>🔋</span>
      </div>
    </div>

    <!-- Designer Specified Header View Label -->
    <h1 class="text-2xl font-black tracking-tight mb-4 font-serif">{{ tutorName }}</h1>

    <!-- Dropdown Selector Wrapper Form -->
    <form [formGroup]="bookingForm" class="space-y-4">
      <div class="relative">
        <select
          formControlName="course"
          class="w-full p-3 border-2 border-zinc-800 rounded-xl text-sm font-medium bg-white focus:outline-none appearance-none cursor-pointer"
        >
          <option value="" disabled selected>Select Course</option>
          @for (course of courses; track course) {
            <option [value]="course">{{ course }}</option>
          }
        </select>
        <span class="absolute right-4 top-4 pointer-events-none text-zinc-500 text-xs">▼</span>
      </div>

      <!-- 7x5 Calendar Grid Matrix Area Component -->
      <div>
        <div class="grid grid-cols-7 text-center text-xs font-bold text-gray-400 mb-2">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span
          ><span>Fri</span><span>Sat</span>
        </div>

        <div class="grid grid-cols-7 gap-y-2 text-center text-sm font-bold">
          @for (dayObj of calendarDays; track $index) {
            <div
              (click)="selectDay(dayObj)"
              [class.text-gray-300]="!dayObj.isCurrentMonth"
              [class.bg-zinc-800]="dayObj.isCurrentMonth && selectedDay === dayObj.day"
              [class.text-white]="dayObj.isCurrentMonth && selectedDay === dayObj.day"
              [class.rounded-full]="dayObj.isCurrentMonth && selectedDay === dayObj.day"
              class="py-2 cursor-pointer transition-all flex items-center justify-center w-8 h-8 mx-auto"
            >
              {{ dayObj.day }}
            </div>
          }
        </div>
      </div>

      <!-- Horizontal Time Slots Row Track Selection Selector -->
      <div class="pt-4">
        <div class="flex justify-between gap-1.5 bg-gray-50 p-1.5 rounded-2xl border">
          @for (slot of timeSlots; track slot) {
            <button
              type="button"
              (click)="selectTime(slot)"
              [class.bg-zinc-800]="selectedTimeSlot === slot"
              [class.text-white]="selectedTimeSlot === slot"
              [class.shadow-xs]="selectedTimeSlot === slot"
              class="flex-1 py-2 text-xs font-bold rounded-xl transition-all text-zinc-700 hover:bg-gray-200/50"
            >
              {{ slot }}
            </button>
          }
        </div>
      </div>

      <!-- Format Toggles Selection Buttons Track -->
      <div class="flex space-x-2 pt-2">
        <button
          type="button"
          (click)="setFormat('Physical Meeting')"
          [class.bg-zinc-800]="selectedFormat === 'Physical Meeting'"
          [class.text-white]="selectedFormat === 'Physical Meeting'"
          class="flex-1 py-3 border-2 border-zinc-800 rounded-xl text-xs font-extrabold flex items-center justify-center space-x-1.5 transition-all"
        >
          <span>👥</span>
          <span>Physical Meeting</span>
        </button>

        <button
          type="button"
          (click)="setFormat('Virtual Meeting')"
          [class.bg-zinc-800]="selectedFormat === 'Virtual Meeting'"
          [class.text-white]="selectedFormat === 'Virtual Meeting'"
          class="flex-1 py-3 border-2 border-zinc-800 rounded-xl text-xs font-extrabold flex items-center justify-center space-x-1.5 transition-all"
        >
          <span>🌐</span>
          <span>Virtual Meeting</span>
        </button>
      </div>

      <!-- Optional Multi-line Notes Text Input area -->
      <div class="pt-1">
        <textarea
          formControlName="notes"
          placeholder="Notes (optional)"
          rows="2"
          class="w-full p-3 border-2 border-zinc-800 rounded-xl text-sm bg-gray-50 focus:outline-none placeholder-gray-400 font-medium resize-none"
        ></textarea>
      </div>
    </form>
  </div>

  <!-- Execution Button Footer Canvas Area -->
  <div class="mt-4">
    @if (errorMessage) {
      <div
        class="p-3 mb-3 text-xs bg-red-50 text-red-600 rounded-xl border border-red-200 font-semibold text-center"
      >
        ⚠️ {{ errorMessage }}
      </div>
    }

    <button
      type="button"
      (click)="submitRequest()"
      class="w-full py-3.5 bg-zinc-700 text-white font-bold text-sm rounded-xl hover:bg-zinc-800 transition-colors tracking-wide shadow-sm"
    >
      Send Request
    </button>
  </div>
</div>
